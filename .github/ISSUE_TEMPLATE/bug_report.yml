name: "Bug report"
description: "Report a bug (Elder Origins)"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the form below — it helps me reproduce and fix the issue faster.

  - type: input
    id: mod_version
    attributes:
      label: "Mod version (optional)"
      placeholder: "e.g. 1.0.0"
    validations:
      required: false

  - type: textarea
    id: what_happened
    attributes:
      label: "What happened?"
      placeholder: "Describe the bug briefly"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      placeholder: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      placeholder: "What actually happened"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Crash report (if any)"
      description: "Paste relevant parts of latest.log / crash-report, or provide a paste link."
      placeholder: "Paste logs or a link here"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: "Additional info (optional)"
      placeholder: "Screenshots, video, or any extra details that might help"
    validations:
      required: false
