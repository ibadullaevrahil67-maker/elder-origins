name: "Bug report"
description: "Сообщить о баге (Elder Origins)"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Заполни поля — так баг проще повторить и исправить.

  - type: input
    id: mod_version
    attributes:
      label: "Версия мода"
      placeholder: "например: 1.0.0"
    validations:
      required: false

  - type: textarea
    id: what_happened
    attributes:
      label: "Что случилось?"
      placeholder: "Кратко опиши баг"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Шаги для воспроизведения"
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Ожидалось"
      placeholder: "Как должно работать"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Получилось"
      placeholder: "Как работает сейчас"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Логи / Crash report (если есть)"
      description: "Можно вставить кусок latest.log / crash-report или дать ссылку на paste."
      placeholder: "Вставь лог или ссылку"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: "Дополнительно (необязательно)"
      placeholder: "Скрины, видео, seed мира, список модов, всё что может помочь"
    validations:
      required: false
